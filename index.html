<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Complex Mapping Visualizer — w = zⁿ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f4; --bg3: #eeede9;
      --text: #1a1a18; --text2: #5f5e5a;
      --border: rgba(0,0,0,0.12);
      --blue: #378ADD; --red: #E24B4A; --purple: #7F77DD;
      --yellow: rgba(255,210,50,0.32); --ystroke: rgba(180,140,0,0.65);
      --grid: rgba(0,0,0,0.07); --axis: rgba(0,0,0,0.38);
      --radius: 10px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
        --text: #e8e6df; --text2: #888780;
        --border: rgba(255,255,255,0.1);
        --blue: #5BA3F0; --red: #F07070; --purple: #AFA9EC;
        --yellow: rgba(255,210,50,0.18); --ystroke: rgba(230,190,40,0.75);
        --grid: rgba(255,255,255,0.07); --axis: rgba(255,255,255,0.32);
      }
    }
    body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; padding:2rem 1rem; }
    .container { max-width:920px; margin:0 auto; }
    h1 { font-size:1.4rem; font-weight:600; margin-bottom:.2rem; letter-spacing:-.01em; }
    .subtitle { font-size:.82rem; color:var(--text2); margin-bottom:1.4rem; }
    .card { background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--radius); padding:1rem 1.25rem; margin-bottom:1rem; }
    .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .row+.row { margin-top:.55rem; }
    label { font-size:.8rem; color:var(--text2); }
    input[type=number],select { padding:5px 9px; border:0.5px solid var(--border); border-radius:8px; font-size:.82rem; background:var(--bg); color:var(--text); outline:none; }
    input[type=number]:focus,select:focus { border-color:var(--blue); }
    input[type=range] { accent-color:var(--blue); }
    .btn { padding:5px 15px; border:0.5px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text); font-size:.82rem; cursor:pointer; }
    .btn:hover { background:var(--bg3); }
    .btn.primary { background:var(--blue); color:#fff; border-color:var(--blue); }
    .btn.primary:hover { opacity:.85; }
    .chip { background:var(--bg3); border:0.5px solid var(--border); border-radius:8px; padding:3px 11px; font-size:.78rem; color:var(--text2); }
    .chip b { color:var(--blue); font-weight:600; }
    .rp { display:none; }
    .rp.on { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:.5rem; }
    .planes { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    @media(max-width:580px){ .planes{grid-template-columns:1fr;} }
    .pbox { background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--radius); padding:.7rem; }
    .plabel { font-size:.72rem; color:var(--text2); margin-bottom:5px; letter-spacing:.04em; text-transform:uppercase; }
    canvas { width:100%; aspect-ratio:1; display:block; border-radius:6px; }
    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:.75rem; }
    @media(max-width:480px){ .info-grid{grid-template-columns:1fr;} }
    .ic { background:var(--bg2); border:0.5px solid var(--border); border-radius:8px; padding:.45rem .75rem; }
    .ic .lbl { font-size:.7rem; color:var(--text2); margin-bottom:2px; }
    .ic .val { font-size:.85rem; font-weight:500; font-family:'SF Mono','Fira Code',monospace; }
    .ic .val.b { color:var(--blue); } .ic .val.r { color:var(--red); }
    .legend { display:flex; gap:1rem; margin-top:.55rem; flex-wrap:wrap; }
    .li { display:flex; align-items:center; gap:5px; font-size:.75rem; color:var(--text2); }
    .dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .sq  { width:9px; height:9px; border-radius:2px; flex-shrink:0; }
    footer { text-align:center; font-size:.73rem; color:var(--text2); margin-top:2rem; padding-top:1rem; border-top:0.5px solid var(--border); }
    footer a { color:var(--blue); text-decoration:none; }
  </style>
</head>
<body>
<div class="container">
  <h1>Complex Mapping Visualizer</h1>
  <p class="subtitle">복소함수 w = zⁿ 의 곡선 및 영역 매핑을 애니메이션으로 탐색합니다.</p>

  <div class="card">
    <div class="row">
      <label>w = z^</label>
      <input id="inp-n" type="number" value="2" min="1" max="8" step="1" style="width:50px"/>
      <label style="margin-left:4px;">모드:</label>
      <select id="inp-mode">
        <option value="curve">곡선</option>
        <option value="region">영역</option>
      </select>
      <label id="lbl-type">곡선:</label>
      <select id="inp-type">
        <option value="line">직선 y = mx</option>
        <option value="hline">수평선 y = c</option>
        <option value="vline">수직선 x = c</option>
        <option value="circle">원 |z| = r</option>
        <option value="ray">반직선 arg(z) = θ°</option>
      </select>
      <select id="inp-reg" style="display:none">
        <option value="disk">원판 |z| ≤ r</option>
        <option value="annulus">환형 r₁ ≤ |z| ≤ r₂</option>
        <option value="sector">부채꼴</option>
        <option value="hstrip">수평 띠 Im(z)</option>
        <option value="vstrip">수직 띠 Re(z)</option>
        <option value="rect">사각형</option>
      </select>
      <input id="inp-p" type="number" value="1.5" step="0.1" style="width:65px"/>
      <label id="lbl-p" style="font-size:.75rem;color:var(--text2);">기울기 m</label>
      <button class="btn primary" id="btn-play" onclick="toggleAnim()">▶ 재생</button>
      <button class="btn" onclick="resetAnim()">↺ 리셋</button>
    </div>

    <div class="rp" id="rp">
      <label id="l1">r₁</label><input id="p1" type="number" value="0.5" step="0.1" style="width:58px"/>
      <label id="l2">r₂</label><input id="p2" type="number" value="2.0" step="0.1" style="width:58px"/>
      <label id="l3">θ₁°</label><input id="p3" type="number" value="0"  step="5"   style="width:58px"/>
      <label id="l4">θ₂°</label><input id="p4" type="number" value="90" step="5"   style="width:58px"/>
    </div>

    <div class="row" style="margin-top:.6rem;">
      <div class="chip">원본: <b id="f-orig">y = 1.5x</b></div>
      <div class="chip">변환: <b id="f-map">—</b></div>
      <div class="chip">n = <b id="f-n">2</b></div>
    </div>
    <div class="row" style="margin-top:.5rem;">
      <label>속도</label>
      <input type="range" id="sp" min="1" max="8" value="3" step="1" style="width:80px"/>
      <span id="sp-v" style="font-size:.75rem;color:var(--text2);min-width:12px;">3</span>
      <label style="margin-left:6px;">진행</label>
      <input type="range" id="pr" min="0" max="100" value="0" step="1" style="width:120px"/>
      <span id="pr-v" style="font-size:.75rem;color:var(--text2);min-width:28px;">0%</span>
    </div>
  </div>

  <div class="planes">
    <div class="pbox"><div class="plabel">z-plane (원본)</div><canvas id="cv-z" width="400" height="400"></canvas></div>
    <div class="pbox"><div class="plabel">w-plane (매핑)</div><canvas id="cv-w" width="400" height="400"></canvas></div>
  </div>

  <div class="legend" style="margin-top:.6rem;">
    <div class="li"><div class="dot" style="background:var(--blue)"></div>z 경로</div>
    <div class="li"><div class="dot" style="background:var(--red)"></div>w 경로</div>
    <div class="li"><div class="dot" style="background:var(--purple)"></div>극좌표 (r, θ)</div>
    <div class="li"><div class="sq" style="background:var(--yellow);border:1px solid var(--ystroke)"></div>매핑 영역</div>
  </div>

  <div class="info-grid">
    <div class="ic"><div class="lbl">현재 z</div><div class="val b" id="i-z">—</div></div>
    <div class="ic"><div class="lbl">변환 w = zⁿ</div><div class="val r" id="i-w">—</div></div>
    <div class="ic"><div class="lbl">|z| → |w| = |z|ⁿ</div><div class="val" id="i-r">—</div></div>
    <div class="ic"><div class="lbl">arg(z) → arg(w) = n·arg(z)</div><div class="val" id="i-t">—</div></div>
  </div>

  <footer>Complex Mapping Visualizer &nbsp;·&nbsp; Vanilla JS &nbsp;·&nbsp; <a href="https://github.com/llouis0622" target="_blank">llouis0622</a></footer>
</div>

<script>
const cvZ=document.getElementById('cv-z'), cvW=document.getElementById('cv-w');
const ctxZ=cvZ.getContext('2d'), ctxW=cvW.getContext('2d');
const SZ=400, C=200, SC=36; // ±5 → 5*36=180px margin

let animId=null, progress=0, pts=[], mpts=[];

const css=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const toS=(x,y)=>[C+x*SC, C-y*SC];
const cPow=(x,y,n)=>{const r=Math.sqrt(x*x+y*y),th=Math.atan2(y,x);return[Math.pow(r,n)*Math.cos(n*th),Math.pow(r,n)*Math.sin(n*th)];};
const fmt=v=>v.toFixed(3);
const deg=r=>(r*180/Math.PI).toFixed(1);

// ── Grid ─────────────────────────────────────────────────────
function drawGrid(ctx){
  ctx.clearRect(0,0,SZ,SZ);
  ctx.strokeStyle=css('--grid'); ctx.lineWidth=0.5;
  for(let i=-5;i<=5;i++){
    let[x1,y1]=toS(i,-5),[x2,y2]=toS(i,5);
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    let[a1,b1]=toS(-5,i),[a2,b2]=toS(5,i);
    ctx.beginPath();ctx.moveTo(a1,b1);ctx.lineTo(a2,b2);ctx.stroke();
  }
  const ac=css('--axis');
  ctx.strokeStyle=ac; ctx.lineWidth=1; ctx.fillStyle=ac;
  // x-axis arrow
  let[ax1,ay]=toS(-4.7,0),[ax2]=toS(4.7,0);
  ctx.beginPath();ctx.moveTo(ax1,ay);ctx.lineTo(ax2,ay);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ax2,ay);ctx.lineTo(ax2-8,ay-4);ctx.lineTo(ax2-8,ay+4);ctx.closePath();ctx.fill();
  // y-axis arrow
  let[bx,by2]=toS(0,4.7),[,by1]=toS(0,-4.7);
  ctx.beginPath();ctx.moveTo(bx,by1);ctx.lineTo(bx,by2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(bx,by2);ctx.lineTo(bx-4,by2+8);ctx.lineTo(bx+4,by2+8);ctx.closePath();ctx.fill();
  // axis labels
  ctx.font='10px -apple-system,sans-serif';
  ctx.fillStyle=css('--text2');
  for(let i=-4;i<=4;i++){
    if(i===0)continue;
    let[px,py]=toS(i,0);
    ctx.fillText(i, px-(i<0?9:4), py+13);
    let[qx,qy]=toS(0,i);
    const lbl=i===1?'i':i===-1?'-i':i+'i';
    ctx.fillText(lbl, C+4, qy+4);
  }
  ctx.fillText('0', C+4, C+13);
}

// ── Draw helpers ─────────────────────────────────────────────
function fadedCurve(ctx,ps,color){
  if(ps.length<2)return;
  ctx.save();ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.globalAlpha=0.18;
  ctx.beginPath();ps.forEach(([x,y],i)=>{let[sx,sy]=toS(x,y);i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);});
  ctx.stroke();ctx.restore();
}
function activePath(ctx,ps,cnt,color){
  if(cnt<2)return;
  ctx.save();ctx.strokeStyle=color;ctx.lineWidth=2.5;
  ctx.beginPath();for(let i=0;i<cnt;i++){let[sx,sy]=toS(ps[i][0],ps[i][1]);i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);}
  ctx.stroke();ctx.restore();
}
function dot(ctx,x,y,color,r=6){
  let[sx,sy]=toS(x,y);
  ctx.save();ctx.fillStyle=color;ctx.beginPath();ctx.arc(sx,sy,r,0,2*Math.PI);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
}
function arm(ctx,x,y){
  let[ox,oy]=toS(0,0),[sx,sy]=toS(x,y);
  ctx.save();ctx.strokeStyle=css('--purple');ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.globalAlpha=0.7;
  ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(sx,sy);ctx.stroke();ctx.restore();
}
function ring(ctx,r){
  let[ox,oy]=toS(0,0);
  ctx.save();ctx.strokeStyle=css('--purple');ctx.lineWidth=1;ctx.setLineDash([3,4]);ctx.globalAlpha=0.33;
  ctx.beginPath();ctx.arc(ox,oy,r*SC,0,2*Math.PI);ctx.stroke();ctx.restore();
}
function lbl(ctx,x,y,text,color){
  let[sx,sy]=toS(x,y);
  ctx.save();ctx.fillStyle=color;ctx.font='10px -apple-system,sans-serif';
  ctx.fillText(text,sx+7,sy-7);ctx.restore();
}

// ── Region: method B — boundary fill ────────────────────────
function getBounds(){
  const n=parseFloat(document.getElementById('inp-n').value)||2;
  const reg=document.getElementById('inp-reg').value;
  const p=parseFloat(document.getElementById('inp-p').value)||1.5;
  const p1=parseFloat(document.getElementById('p1').value)||0.5;
  const p2=parseFloat(document.getElementById('p2').value)||2;
  const p3=parseFloat(document.getElementById('p3').value)||0;
  const p4=parseFloat(document.getElementById('p4').value)||90;
  const N=180;
  let zB=[];

  if(reg==='disk'){
    const r=Math.abs(p)||1.5, arc=[];
    for(let k=0;k<=N;k++){const a=2*Math.PI*k/N;arc.push([r*Math.cos(a),r*Math.sin(a)]);}
    zB=[arc];
  } else if(reg==='annulus'){
    const outer=[], inner=[];
    for(let k=0;k<=N;k++){const a=2*Math.PI*k/N;outer.push([p2*Math.cos(a),p2*Math.sin(a)]);}
    for(let k=0;k<=N;k++){const a=2*Math.PI*k/N;inner.push([p1*Math.cos(a),p1*Math.sin(a)]);}
    zB=[outer,inner];
  } else if(reg==='sector'){
    const a1=p3*Math.PI/180, a2=p4*Math.PI/180, r=p2;
    const seg=[[0,0]];
    for(let k=0;k<=N;k++){const a=a1+(a2-a1)*k/N;seg.push([r*Math.cos(a),r*Math.sin(a)]);}
    seg.push([0,0]);
    zB=[seg];
  } else if(reg==='hstrip'){
    zB=[[[-4.5,p1],[4.5,p1],[4.5,p2],[-4.5,p2],[-4.5,p1]]];
  } else if(reg==='vstrip'){
    zB=[[[p1,-4.5],[p2,-4.5],[p2,4.5],[p1,4.5],[p1,-4.5]]];
  } else if(reg==='rect'){
    zB=[[[p1,p3],[p2,p3],[p2,p4],[p1,p4],[p1,p3]]];
  }

  const wB=zB.map(b=>b.map(([x,y])=>cPow(x,y,n)));
  return{zB,wB};
}

function fillRegion(ctx,bounds,frac){
  for(const b of bounds){
    const cnt=Math.max(3,Math.floor(b.length*frac));
    ctx.save();
    ctx.fillStyle=css('--yellow');
    ctx.strokeStyle=css('--ystroke');
    ctx.lineWidth=1.8;
    ctx.beginPath();
    for(let i=0;i<cnt;i++){let[sx,sy]=toS(b[i][0],b[i][1]);i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);}
    if(frac>=1)ctx.closePath();
    ctx.fill();ctx.stroke();
    ctx.restore();
  }
}

// ── Curve points ─────────────────────────────────────────────
function getPoints(){
  const type=document.getElementById('inp-type').value;
  const p=parseFloat(document.getElementById('inp-p').value)||1.5;
  const ps=[];
  if(type==='line')      {for(let t=-4.5;t<=4.5;t+=0.04)ps.push([t,p*t]);}
  else if(type==='hline'){for(let t=-4.5;t<=4.5;t+=0.04)ps.push([t,p]);}
  else if(type==='vline'){for(let t=-4.5;t<=4.5;t+=0.04)ps.push([p,t]);}
  else if(type==='circle'){const r=Math.abs(p)||1;for(let a=0;a<=2*Math.PI+.05;a+=.03)ps.push([r*Math.cos(a),r*Math.sin(a)]);}
  else if(type==='ray'){const a=p*Math.PI/180;for(let r=.05;r<=4.5;r+=.04)ps.push([r*Math.cos(a),r*Math.sin(a)]);}
  return ps;
}

// ── Formula ───────────────────────────────────────────────────
function updateFormula(){
  const n=parseFloat(document.getElementById('inp-n').value)||2;
  const mode=document.getElementById('inp-mode').value;
  const type=document.getElementById('inp-type').value;
  const reg=document.getElementById('inp-reg').value;
  const p=parseFloat(document.getElementById('inp-p').value)||1.5;
  document.getElementById('f-n').textContent=n;
  if(mode==='curve'){
    const labels={line:'기울기 m',hline:'y값 c',vline:'x값 c',circle:'반지름 r',ray:'각도 (°)'};
    document.getElementById('lbl-p').textContent=labels[type]||'파라미터';
    let orig='',mapped='';
    if(type==='line'){orig=`y = ${p}x`;const nm=Math.tan(n*Math.atan(p));mapped=`y ≈ ${nm.toFixed(3)}x`;}
    else if(type==='hline'){orig=`Im(z) = ${p}i`;mapped='포물선 변환';}
    else if(type==='vline'){orig=`Re(z) = ${p}`;mapped='포물선 변환';}
    else if(type==='circle'){orig=`|z| = ${p}`;mapped=`|w| = ${Math.pow(Math.abs(p),n).toFixed(3)}`;}
    else if(type==='ray'){orig=`arg(z) = ${p}°`;mapped=`arg(w) = ${(n*p).toFixed(1)}°`;}
    document.getElementById('f-orig').textContent=orig;
    document.getElementById('f-map').textContent=mapped;
  } else {
    const rl={disk:'원판',annulus:'환형',sector:'부채꼴',hstrip:'수평 띠',vstrip:'수직 띠',rect:'사각형'};
    document.getElementById('f-orig').textContent=rl[reg]||reg;
    document.getElementById('f-map').textContent=`영역 변환 (n=${n})`;
    document.getElementById('lbl-p').textContent='r (주 파라미터)';
  }
}

// ── Mode switch ───────────────────────────────────────────────
function onModeChange(){
  const curve=document.getElementById('inp-mode').value==='curve';
  document.getElementById('inp-type').style.display=curve?'':'none';
  document.getElementById('inp-reg').style.display=curve?'none':'';
  document.getElementById('lbl-type').textContent=curve?'곡선:':'영역:';
  document.getElementById('rp').classList.toggle('on',!curve);
  syncRegionParams();
  resetAnim();
}

function syncRegionParams(){
  const reg=document.getElementById('inp-reg').value;
  const show=(id,on)=>{document.getElementById(id).style.display=on?'':'none';};
  show('l1',true);show('p1',true);
  const has2=reg!=='disk';
  show('l2',has2);show('p2',has2);
  const has34=['sector','rect'].includes(reg);
  show('l3',has34);show('p3',has34);show('l4',has34);show('p4',has34);
  const lbls={
    disk:   ['r','','',''],
    annulus:['r₁','r₂','',''],
    sector: ['r (내)','r (외)','θ₁°','θ₂°'],
    hstrip: ['Im 하한','Im 상한','',''],
    vstrip: ['Re 하한','Re 상한','',''],
    rect:   ['x₁','x₂','y₁','y₂'],
  };
  const l=lbls[reg]||['p1','p2','p3','p4'];
  ['l1','l2','l3','l4'].forEach((id,i)=>{document.getElementById(id).textContent=l[i];});
}

// ── Render ────────────────────────────────────────────────────
function render(frac){
  const n=parseFloat(document.getElementById('inp-n').value)||2;
  const mode=document.getElementById('inp-mode').value;
  drawGrid(ctxZ); drawGrid(ctxW);
  const bc=css('--blue'),rc=css('--red');

  if(mode==='curve'){
    fadedCurve(ctxZ,pts,bc); fadedCurve(ctxW,mpts,rc);
    const cnt=Math.max(1,Math.floor(pts.length*frac));
    activePath(ctxZ,pts,cnt,bc); activePath(ctxW,mpts,cnt,rc);
    if(cnt>=1){
      const[zx,zy]=pts[cnt-1],[wx,wy]=mpts[cnt-1];
      const r=Math.sqrt(zx*zx+zy*zy),th=Math.atan2(zy,zx);
      ring(ctxZ,r);arm(ctxZ,zx,zy);ring(ctxW,Math.pow(r,n));arm(ctxW,wx,wy);
      dot(ctxZ,zx,zy,bc);lbl(ctxZ,zx,zy,`(${fmt(zx)}, ${fmt(zy)})`,bc);
      dot(ctxW,wx,wy,rc);lbl(ctxW,wx,wy,`(${fmt(wx)}, ${fmt(wy)})`,rc);
      document.getElementById('i-z').textContent=`${fmt(zx)} ${zy>=0?'+':'-'} ${fmt(Math.abs(zy))}i`;
      document.getElementById('i-w').textContent=`${fmt(wx)} ${wy>=0?'+':'-'} ${fmt(Math.abs(wy))}i`;
      document.getElementById('i-r').textContent=`${fmt(r)} → ${fmt(Math.pow(r,n))}`;
      document.getElementById('i-t').textContent=`${deg(th)}° → ${deg(n*th)}°`;
    }
  } else {
    const{zB,wB}=getBounds();
    // z-plane: full original region
    fillRegion(ctxZ,zB,1);
    for(const b of zB){
      ctxZ.save();ctxZ.strokeStyle=bc;ctxZ.lineWidth=1.8;
      ctxZ.beginPath();b.forEach(([x,y],i)=>{let[sx,sy]=toS(x,y);i===0?ctxZ.moveTo(sx,sy):ctxZ.lineTo(sx,sy);});
      ctxZ.closePath();ctxZ.stroke();ctxZ.restore();
    }
    // w-plane: animated mapped region
    fillRegion(ctxW,wB,frac);
    for(const b of wB){
      const cnt=Math.max(2,Math.floor(b.length*frac));
      ctxW.save();ctxW.strokeStyle=rc;ctxW.lineWidth=1.8;
      ctxW.beginPath();for(let i=0;i<cnt;i++){let[sx,sy]=toS(b[i][0],b[i][1]);i===0?ctxW.moveTo(sx,sy):ctxW.lineTo(sx,sy);}
      if(frac>=1)ctxW.closePath();ctxW.stroke();ctxW.restore();
    }
    ['i-z','i-w','i-r','i-t'].forEach(id=>document.getElementById(id).textContent='영역 모드');
  }

  const pct=Math.round(frac*100);
  document.getElementById('pr').value=pct;
  document.getElementById('pr-v').textContent=pct+'%';
}

// ── Animation ─────────────────────────────────────────────────
function toggleAnim(){
  const btn=document.getElementById('btn-play');
  if(animId){cancelAnimationFrame(animId);animId=null;btn.textContent='▶ 재생';return;}
  if(progress>=1)progress=0;
  btn.textContent='⏸ 일시정지';
  const step=()=>{
    const sp=parseInt(document.getElementById('sp').value)||3;
    progress=Math.min(progress+sp*0.0025,1);
    render(progress);
    if(progress<1)animId=requestAnimationFrame(step);
    else{animId=null;btn.textContent='▶ 재생';}
  };
  animId=requestAnimationFrame(step);
}

function resetAnim(){
  if(animId){cancelAnimationFrame(animId);animId=null;}
  progress=0;
  document.getElementById('btn-play').textContent='▶ 재생';
  const n=parseFloat(document.getElementById('inp-n').value)||2;
  pts=getPoints();mpts=pts.map(([x,y])=>cPow(x,y,n));
  updateFormula();render(0);
}

// ── Events ────────────────────────────────────────────────────
document.getElementById('pr').addEventListener('input',function(){
  if(animId){cancelAnimationFrame(animId);animId=null;document.getElementById('btn-play').textContent='▶ 재생';}
  progress=this.value/100;render(progress);
});
document.getElementById('sp').addEventListener('input',function(){document.getElementById('sp-v').textContent=this.value;});
document.getElementById('inp-mode').addEventListener('change',onModeChange);
document.getElementById('inp-reg').addEventListener('change',()=>{syncRegionParams();resetAnim();});
['inp-n','inp-type','inp-p','p1','p2','p3','p4'].forEach(id=>{
  const el=document.getElementById(id);if(!el)return;
  el.addEventListener('change',resetAnim);
  el.addEventListener('input',()=>{
    const n=parseFloat(document.getElementById('inp-n').value)||2;
    pts=getPoints();mpts=pts.map(([x,y])=>cPow(x,y,n));
    updateFormula();render(progress);
  });
});

resetAnim();
</script>
