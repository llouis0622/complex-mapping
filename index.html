<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Complex Mapping Visualizer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#eeede9;
  --text:#1a1a18;--text2:#5f5e5a;
  --border:rgba(0,0,0,0.12);
  --blue:#378ADD;--red:#E24B4A;--purple:#7F77DD;--green:#3B6D11;
  --yellow:rgba(255,210,50,0.28);--ystroke:rgba(160,120,0,0.6);
  --grid:rgba(0,0,0,0.07);--axis:rgba(0,0,0,0.38);
  --r:10px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
  --text:#e8e6df;--text2:#888780;
  --border:rgba(255,255,255,0.1);
  --blue:#5BA3F0;--red:#F07070;--purple:#AFA9EC;--green:#97C459;
  --yellow:rgba(255,210,50,0.15);--ystroke:rgba(220,180,30,0.7);
  --grid:rgba(255,255,255,0.07);--axis:rgba(255,255,255,0.3);
}}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:1.5rem 1rem;}
.container{max-width:960px;margin:0 auto;}
h1{font-size:1.35rem;font-weight:600;margin-bottom:.15rem;letter-spacing:-.01em;}
.subtitle{font-size:.8rem;color:var(--text2);margin-bottom:1.2rem;}

/* tabs */
.tabs{display:flex;gap:4px;margin-bottom:.8rem;flex-wrap:wrap;}
.tab{padding:5px 14px;border:0.5px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text2);font-size:.8rem;cursor:pointer;}
.tab:hover{background:var(--bg3);}
.tab.active{background:var(--blue);color:#fff;border-color:var(--blue);}

.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:.9rem 1.1rem;margin-bottom:.8rem;}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.row+.row{margin-top:.5rem;}
label{font-size:.78rem;color:var(--text2);}
input[type=number],select{padding:5px 8px;border:0.5px solid var(--border);border-radius:7px;font-size:.8rem;background:var(--bg);color:var(--text);outline:none;}
input[type=number]:focus,select:focus{border-color:var(--blue);}
input[type=range]{accent-color:var(--blue);}
.btn{padding:5px 13px;border:0.5px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);font-size:.8rem;cursor:pointer;}
.btn:hover{background:var(--bg3);}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn.primary:hover{opacity:.85;}

.chip{background:var(--bg3);border:0.5px solid var(--border);border-radius:7px;padding:3px 10px;font-size:.76rem;color:var(--text2);}
.chip b{color:var(--blue);font-weight:600;}

.planes{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;}
@media(max-width:580px){.planes{grid-template-columns:1fr;}}
.pbox{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:.6rem;}
.plabel{font-size:.7rem;color:var(--text2);margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase;}
canvas{width:100%;aspect-ratio:1;display:block;border-radius:5px;}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:.7rem;}
@media(max-width:460px){.info-grid{grid-template-columns:1fr;}}
.ic{background:var(--bg2);border:0.5px solid var(--border);border-radius:7px;padding:.4rem .7rem;}
.ic .lbl{font-size:.68rem;color:var(--text2);margin-bottom:1px;}
.ic .val{font-size:.82rem;font-weight:500;font-family:'SF Mono','Fira Code',monospace;}
.ic .val.b{color:var(--blue);}.ic .val.r{color:var(--red);}

.legend{display:flex;gap:.8rem;margin-top:.5rem;flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:4px;font-size:.72rem;color:var(--text2);}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sq{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* param rows */
.prow{display:none;}
.prow.on{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

footer{text-align:center;font-size:.7rem;color:var(--text2);margin-top:1.5rem;padding-top:.8rem;border-top:0.5px solid var(--border);}
footer a{color:var(--blue);text-decoration:none;}
</style>
</head>
<body>
<div class="container">
<h1>Complex Mapping Visualizer</h1>
<p class="subtitle">겹선형변환과 사상 — 3.1 기본 사상 · 3.2 선형분수변환 · 3.3 그 밖의 사상</p>

<!-- Section tabs -->
<div class="tabs">
  <button class="tab active" onclick="setSection('s1',this)">3.1 기본 사상</button>
  <button class="tab" onclick="setSection('s2',this)">3.2 선형분수변환</button>
  <button class="tab" onclick="setSection('s3',this)">3.3 그 밖의 사상</button>
</div>

<div class="card">
  <div class="row">
    <!-- Section 1 -->
    <span id="s1-ui" style="display:contents">
      <label>변환:</label>
      <select id="s1-fn">
        <option value="trans">평행이동 w = z + b</option>
        <option value="rot">회전 w = e^(iα)z</option>
        <option value="mag">확대/축소 w = az (a>0)</option>
        <option value="linear">1차 함수 w = az + b</option>
        <option value="inv">반전 w = 1/z</option>
      </select>
    </span>
    <!-- Section 2 -->
    <span id="s2-ui" style="display:none">
      <label>변환:</label>
      <select id="s2-fn">
        <option value="mobius">겹선형 w = (az+b)/(cz+d)</option>
      </select>
    </span>
    <!-- Section 3 -->
    <span id="s3-ui" style="display:none">
      <label>변환:</label>
      <select id="s3-fn">
        <option value="zsq">w = z²</option>
        <option value="zn">w = zⁿ</option>
        <option value="conj">w = z̄ (켤레)</option>
        <option value="jouk">w = ½(z + 1/z) Joukowski</option>
      </select>
    </span>

    <label style="margin-left:4px;">곡선/영역:</label>
    <select id="inp-curve">
      <option value="line">직선 y = mx</option>
      <option value="hline">수평선 Im(z) = c</option>
      <option value="vline">수직선 Re(z) = c</option>
      <option value="circle">원 |z| = r</option>
      <option value="ray">반직선 arg(z) = θ°</option>
      <option value="disk">영역: 원판 |z| ≤ r</option>
      <option value="annulus">영역: 환형 r₁≤|z|≤r₂</option>
      <option value="sector">영역: 부채꼴</option>
      <option value="hstrip">영역: 수평 띠</option>
      <option value="vstrip">영역: 수직 띠</option>
      <option value="rect">영역: 사각형</option>
      <option value="uhalf">영역: 상반평면</option>
      <option value="rhalf">영역: 우반평면</option>
    </select>

    <button class="btn primary" id="btn-play" onclick="toggleAnim()">▶ 재생</button>
    <button class="btn" onclick="resetAnim()">↺ 리셋</button>
  </div>

  <!-- s1 params -->
  <div class="prow on" id="pr-s1-trans">
    <label>b (복소수):</label>
    <label>Re</label><input id="b-re" type="number" value="1" step="0.5" style="width:55px"/>
    <label>Im</label><input id="b-im" type="number" value="2" step="0.5" style="width:55px"/>
  </div>
  <div class="prow" id="pr-s1-rot">
    <label>α (°):</label><input id="rot-a" type="number" value="90" step="15" style="width:65px"/>
  </div>
  <div class="prow" id="pr-s1-mag">
    <label>a (양의 실수):</label><input id="mag-a" type="number" value="2" step="0.5" style="width:65px"/>
  </div>
  <div class="prow" id="pr-s1-linear">
    <label>a:</label><label>Re</label><input id="la-re" type="number" value="1" step="0.5" style="width:50px"/>
    <label>Im</label><input id="la-im" type="number" value="-1" step="0.5" style="width:50px"/>
    <label style="margin-left:6px;">b:</label><label>Re</label><input id="lb-re" type="number" value="2" step="0.5" style="width:50px"/>
    <label>Im</label><input id="lb-im" type="number" value="1" step="0.5" style="width:50px"/>
  </div>

  <!-- s2 params -->
  <div class="prow" id="pr-s2-mobius">
    <label>a:</label><input id="ma-re" type="number" value="1" step="0.5" style="width:50px"/>
    <label>+</label><input id="ma-im" type="number" value="0" step="0.5" style="width:45px"/><label>i</label>
    <label style="margin-left:4px;">b:</label><input id="mb-re" type="number" value="0" step="0.5" style="width:50px"/>
    <label>+</label><input id="mb-im" type="number" value="1" step="0.5" style="width:45px"/><label>i</label>
    <label style="margin-left:4px;">c:</label><input id="mc-re" type="number" value="1" step="0.5" style="width:50px"/>
    <label>+</label><input id="mc-im" type="number" value="0" step="0.5" style="width:45px"/><label>i</label>
    <label style="margin-left:4px;">d:</label><input id="md-re" type="number" value="0" step="0.5" style="width:50px"/>
    <label>+</label><input id="md-im" type="number" value="1" step="0.5" style="width:45px"/><label>i</label>
  </div>

  <!-- s3 params -->
  <div class="prow" id="pr-s3-zn">
    <label>n:</label><input id="zn-n" type="number" value="3" min="2" max="8" step="1" style="width:55px"/>
  </div>

  <!-- curve param -->
  <div class="prow on" id="pr-curve">
    <label id="cp-label">기울기 m:</label>
    <input id="cp-val" type="number" value="0.5" step="0.1" style="width:65px"/>
    <label id="cp2-label" style="display:none">r₂ / θ₂:</label>
    <input id="cp2-val" type="number" value="2" step="0.1" style="width:65px;display:none"/>
    <label id="cp3-label" style="display:none">θ₁°:</label>
    <input id="cp3-val" type="number" value="0" step="5" style="width:60px;display:none"/>
    <label id="cp4-label" style="display:none">θ₂°:</label>
    <input id="cp4-val" type="number" value="90" step="5" style="width:60px;display:none"/>
  </div>

  <div class="row" style="margin-top:.5rem;">
    <div class="chip">원본: <b id="f-orig">—</b></div>
    <div class="chip">변환: <b id="f-fn">—</b></div>
    <div class="chip">상: <b id="f-map">—</b></div>
  </div>
  <div class="row" style="margin-top:.45rem;">
    <label>속도</label>
    <input type="range" id="sp" min="1" max="8" value="3" step="1" style="width:75px"/>
    <span id="sp-v" style="font-size:.72rem;color:var(--text2);">3</span>
    <label style="margin-left:6px;">진행</label>
    <input type="range" id="pr-sl" min="0" max="100" value="0" step="1" style="width:110px"/>
    <span id="pr-v" style="font-size:.72rem;color:var(--text2);">0%</span>
  </div>
</div>

<div class="planes">
  <div class="pbox"><div class="plabel">z-plane (원본)</div><canvas id="cv-z" width="400" height="400"></canvas></div>
  <div class="pbox"><div class="plabel">w-plane (매핑)</div><canvas id="cv-w" width="400" height="400"></canvas></div>
</div>

<div class="legend" style="margin-top:.5rem;">
  <div class="li"><div class="dot" style="background:var(--blue)"></div>z 경로</div>
  <div class="li"><div class="dot" style="background:var(--red)"></div>w 경로</div>
  <div class="li"><div class="dot" style="background:var(--purple)"></div>극좌표 (r,θ)</div>
  <div class="li"><div class="sq" style="background:var(--yellow);border:1px solid var(--ystroke)"></div>매핑 영역</div>
</div>

<div class="info-grid">
  <div class="ic"><div class="lbl">현재 z</div><div class="val b" id="i-z">—</div></div>
  <div class="ic"><div class="lbl">변환 f(z)</div><div class="val r" id="i-w">—</div></div>
  <div class="ic"><div class="lbl">|z| → |f(z)|</div><div class="val" id="i-r">—</div></div>
  <div class="ic"><div class="lbl">arg(z) → arg(f(z))</div><div class="val" id="i-t">—</div></div>
</div>

<footer>Complex Mapping Visualizer &nbsp;·&nbsp; 3장 겹선형변환과 사상 &nbsp;·&nbsp; <a href="https://github.com/llouis0622" target="_blank">llouis0622</a></footer>
</div>

<script>
// ── Canvas setup ──────────────────────────────────────────────
const cvZ=document.getElementById('cv-z'),cvW=document.getElementById('cv-w');
const ctxZ=cvZ.getContext('2d'),ctxW=cvW.getContext('2d');
const SZ=400,C=200,SC=36; // ±5 range

let animId=null,progress=0,pts=[],mpts=[];
let currentSection='s1';

// ── CSS variable reader ───────────────────────────────────────
const css=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();

// ── Complex arithmetic ────────────────────────────────────────
const cadd=([a,b],[c,d])=>[a+c,b+d];
const csub=([a,b],[c,d])=>[a-c,b-d];
const cmul=([a,b],[c,d])=>[a*c-b*d,a*d+b*c];
const cdiv=([a,b],[c,d])=>{const s=c*c+d*d;return s<1e-14?[1e9,1e9]:[(a*c+b*d)/s,(b*c-a*d)/s];};
const cabs=([a,b])=>Math.sqrt(a*a+b*b);
const carg=([a,b])=>Math.atan2(b,a);
const cconj=([a,b])=>[a,-b];
const cpow=([x,y],n)=>{const r=Math.sqrt(x*x+y*y),th=Math.atan2(y,x);return[Math.pow(r,n)*Math.cos(n*th),Math.pow(r,n)*Math.sin(n*th)];};
const fmt=v=>isFinite(v)?v.toFixed(3):'∞';
const deg=r=>(r*180/Math.PI).toFixed(1);

// ── Get current transform function ───────────────────────────
function getTransform(){
  const sec=currentSection;
  if(sec==='s1'){
    const fn=document.getElementById('s1-fn').value;
    if(fn==='trans'){
      const b=[parseFloat(document.getElementById('b-re').value)||0,parseFloat(document.getElementById('b-im').value)||0];
      return z=>cadd(z,b);
    } else if(fn==='rot'){
      const a=(parseFloat(document.getElementById('rot-a').value)||0)*Math.PI/180;
      const ea=[Math.cos(a),Math.sin(a)];
      return z=>cmul(ea,z);
    } else if(fn==='mag'){
      const a=parseFloat(document.getElementById('mag-a').value)||2;
      return z=>[z[0]*a,z[1]*a];
    } else if(fn==='linear'){
      const a=[parseFloat(document.getElementById('la-re').value)||1,parseFloat(document.getElementById('la-im').value)||0];
      const b=[parseFloat(document.getElementById('lb-re').value)||0,parseFloat(document.getElementById('lb-im').value)||0];
      return z=>cadd(cmul(a,z),b);
    } else { // inv
      return z=>cdiv([1,0],z);
    }
  } else if(sec==='s2'){
    const a=[parseFloat(document.getElementById('ma-re').value)||1,parseFloat(document.getElementById('ma-im').value)||0];
    const b=[parseFloat(document.getElementById('mb-re').value)||0,parseFloat(document.getElementById('mb-im').value)||1];
    const c=[parseFloat(document.getElementById('mc-re').value)||1,parseFloat(document.getElementById('mc-im').value)||0];
    const d=[parseFloat(document.getElementById('md-re').value)||0,parseFloat(document.getElementById('md-im').value)||1];
    return z=>cdiv(cadd(cmul(a,z),b),cadd(cmul(c,z),d));
  } else {
    const fn=document.getElementById('s3-fn').value;
    if(fn==='zsq') return z=>cpow(z,2);
    else if(fn==='zn'){const n=parseInt(document.getElementById('zn-n').value)||3;return z=>cpow(z,n);}
    else if(fn==='conj') return z=>cconj(z);
    else return z=>{ // Joukowski
      const iz=cdiv([1,0],z);
      return[(z[0]+iz[0])*0.5,(z[1]+iz[1])*0.5];
    };
  }
}

// ── Section switch ────────────────────────────────────────────
function setSection(sec,tabEl){
  currentSection=sec;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  tabEl.classList.add('active');
  ['s1-ui','s2-ui','s3-ui'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById(sec+'-ui').style.display='contents';
  // show correct param row
  updateParamVisibility();
  resetAnim();
}

function updateParamVisibility(){
  // hide all param rows first
  document.querySelectorAll('.prow').forEach(r=>{r.classList.remove('on');});
  document.getElementById('pr-curve').classList.add('on');

  const sec=currentSection;
  if(sec==='s1'){
    const fn=document.getElementById('s1-fn').value;
    const map={trans:'pr-s1-trans',rot:'pr-s1-rot',mag:'pr-s1-mag',linear:'pr-s1-linear'};
    if(map[fn]) document.getElementById(map[fn]).classList.add('on');
  } else if(sec==='s2'){
    document.getElementById('pr-s2-mobius').classList.add('on');
  } else {
    const fn=document.getElementById('s3-fn').value;
    if(fn==='zn') document.getElementById('pr-s3-zn').classList.add('on');
  }
  updateCurveParams();
  updateFormula();
}

// ── Curve param UI ────────────────────────────────────────────
function updateCurveParams(){
  const curve=document.getElementById('inp-curve').value;
  const show=(id,on)=>document.getElementById(id).style.display=on?'':'none';
  const lbls={
    line:['기울기 m','','',''],
    hline:['Im값 c','','',''],
    vline:['Re값 c','','',''],
    circle:['반지름 r','','',''],
    ray:['각도 θ°','','',''],
    disk:['반지름 r','','',''],
    annulus:['r₁','r₂','',''],
    sector:['r','θ₁°','θ₂°',''],
    hstrip:['Im 하한','Im 상한','',''],
    vstrip:['Re 하한','Re 상한','',''],
    rect:['x₁  y₁','x₂  y₂','',''],
    uhalf:['— (전체)','','',''],
    rhalf:['— (전체)','','',''],
  };
  const l=lbls[curve]||['값','','',''];
  document.getElementById('cp-label').textContent=l[0];
  const has2=l[1]!=='';
  show('cp2-label',has2);show('cp2-val',has2);
  if(has2)document.getElementById('cp2-label').textContent=l[1];
  // sector extra
  const hasSector=curve==='sector';
  show('cp3-label',hasSector);show('cp3-val',hasSector);
  show('cp4-label',hasSector);show('cp4-val',hasSector);

  const isRegion=['disk','annulus','sector','hstrip','vstrip','rect','uhalf','rhalf'].includes(curve);
  show('cp-val',!['uhalf','rhalf'].includes(curve));
}

// ── Formula display ───────────────────────────────────────────
function updateFormula(){
  const sec=currentSection;
  const curve=document.getElementById('inp-curve').value;
  const p=parseFloat(document.getElementById('cp-val').value)||0.5;
  const isReg=['disk','annulus','sector','hstrip','vstrip','rect','uhalf','rhalf'].includes(curve);

  let fn_str='', orig_str='', map_str='';

  if(sec==='s1'){
    const fn=document.getElementById('s1-fn').value;
    const bre=document.getElementById('b-re').value,bim=document.getElementById('b-im').value;
    if(fn==='trans') fn_str=`w = z + (${bre}+${bim}i)`;
    else if(fn==='rot') fn_str=`w = e^(i·${document.getElementById('rot-a').value}°)·z`;
    else if(fn==='mag') fn_str=`w = ${document.getElementById('mag-a').value}z`;
    else if(fn==='linear'){
      const are=document.getElementById('la-re').value,aim=document.getElementById('la-im').value;
      fn_str=`w = (${are}+${aim}i)z + (${bre}+${bim}i)`;
    } else fn_str='w = 1/z';
  } else if(sec==='s2'){
    fn_str=`w = (az+b)/(cz+d)`;
  } else {
    const fn=document.getElementById('s3-fn').value;
    const labels={zsq:'w = z²',zn:`w = z^${document.getElementById('zn-n').value}`,conj:'w = z̄',jouk:'w = ½(z+1/z)'};
    fn_str=labels[fn];
  }

  if(isReg){
    const rlbl={disk:'원판',annulus:'환형',sector:'부채꼴',hstrip:'수평띠',vstrip:'수직띠',rect:'사각형',uhalf:'상반평면',rhalf:'우반평면'};
    orig_str=rlbl[curve]||'영역'; map_str='영역 변환';
  } else {
    const clbl={line:`y=${p}x`,hline:`Im(z)=${p}i`,vline:`Re(z)=${p}`,circle:`|z|=${p}`,ray:`arg=${p}°`};
    orig_str=clbl[curve]||curve; map_str='곡선 변환';
  }

  document.getElementById('f-fn').textContent=fn_str;
  document.getElementById('f-orig').textContent=orig_str;
  document.getElementById('f-map').textContent=map_str;
}

// ── Point generators ──────────────────────────────────────────
function getCurvePoints(){
  const curve=document.getElementById('inp-curve').value;
  const p=parseFloat(document.getElementById('cp-val').value)||0.5;
  const p2=parseFloat(document.getElementById('cp2-val').value)||2;
  const p3=parseFloat(document.getElementById('cp3-val').value)||0;
  const p4=parseFloat(document.getElementById('cp4-val').value)||90;
  const ps=[];

  if(curve==='line'){for(let t=-4.5;t<=4.5;t+=0.04)ps.push([t,p*t]);}
  else if(curve==='hline'){for(let t=-4.5;t<=4.5;t+=0.04)ps.push([t,p]);}
  else if(curve==='vline'){for(let t=-4.5;t<=4.5;t+=0.04)ps.push([p,t]);}
  else if(curve==='circle'){const r=Math.abs(p)||1;for(let a=0;a<=2*Math.PI+.05;a+=.03)ps.push([r*Math.cos(a),r*Math.sin(a)]);}
  else if(curve==='ray'){const a=p*Math.PI/180;for(let r=.05;r<=4.5;r+=.04)ps.push([r*Math.cos(a),r*Math.sin(a)]);}
  return ps;
}

function getRegionBounds(){
  const curve=document.getElementById('inp-curve').value;
  const p=parseFloat(document.getElementById('cp-val').value)||1.5;
  const p2=parseFloat(document.getElementById('cp2-val').value)||2;
  const p3=parseFloat(document.getElementById('cp3-val').value)||0;
  const p4=parseFloat(document.getElementById('cp4-val').value)||90;
  const N=160;
  let zB=[];

  if(curve==='disk'){
    const r=Math.abs(p)||1.5,arc=[];
    for(let k=0;k<=N;k++){const a=2*Math.PI*k/N;arc.push([r*Math.cos(a),r*Math.sin(a)]);}
    zB=[arc];
  } else if(curve==='annulus'){
    const outer=[],inner=[];
    for(let k=0;k<=N;k++){const a=2*Math.PI*k/N;outer.push([p2*Math.cos(a),p2*Math.sin(a)]);}
    for(let k=0;k<=N;k++){const a=2*Math.PI*k/N;inner.push([p*Math.cos(a),p*Math.sin(a)]);}
    zB=[outer,inner];
  } else if(curve==='sector'){
    const a1=p3*Math.PI/180,a2=p4*Math.PI/180,r=p;
    const seg=[[0,0]];
    for(let k=0;k<=N;k++){const a=a1+(a2-a1)*k/N;seg.push([r*Math.cos(a),r*Math.sin(a)]);}
    seg.push([0,0]); zB=[seg];
  } else if(curve==='hstrip'){
    zB=[[[-4.5,p],[4.5,p],[4.5,p2],[-4.5,p2],[-4.5,p]]];
  } else if(curve==='vstrip'){
    zB=[[[p,-4.5],[p2,-4.5],[p2,4.5],[p,4.5],[p,-4.5]]];
  } else if(curve==='rect'){
    zB=[[[p,p3],[p2,p3],[p2,p4],[p,p4],[p,p3]]];
  } else if(curve==='uhalf'){
    zB=[[[-4.5,0],[4.5,0],[4.5,4.5],[-4.5,4.5],[-4.5,0]]];
  } else if(curve==='rhalf'){
    zB=[[[0,-4.5],[4.5,-4.5],[4.5,4.5],[0,4.5],[0,-4.5]]];
  }
  return zB;
}

// ── Drawing ───────────────────────────────────────────────────
const toS=(x,y)=>[C+x*SC,C-y*SC];

function drawGrid(ctx){
  ctx.clearRect(0,0,SZ,SZ);
  ctx.strokeStyle=css('--grid');ctx.lineWidth=0.5;
  for(let i=-5;i<=5;i++){
    let[x1,y1]=toS(i,-5),[x2,y2]=toS(i,5);
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    let[a1,b1]=toS(-5,i),[a2,b2]=toS(5,i);
    ctx.beginPath();ctx.moveTo(a1,b1);ctx.lineTo(a2,b2);ctx.stroke();
  }
  const ac=css('--axis');
  ctx.strokeStyle=ac;ctx.lineWidth=1;ctx.fillStyle=ac;
  let[ax1,ay]=toS(-4.7,0),[ax2]=toS(4.7,0);
  ctx.beginPath();ctx.moveTo(ax1,ay);ctx.lineTo(ax2,ay);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ax2,ay);ctx.lineTo(ax2-8,ay-4);ctx.lineTo(ax2-8,ay+4);ctx.closePath();ctx.fill();
  let[bx,by2]=toS(0,4.7),[,by1]=toS(0,-4.7);
  ctx.beginPath();ctx.moveTo(bx,by1);ctx.lineTo(bx,by2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(bx,by2);ctx.lineTo(bx-4,by2+8);ctx.lineTo(bx+4,by2+8);ctx.closePath();ctx.fill();
  ctx.font='10px -apple-system,sans-serif';ctx.fillStyle=css('--text2');
  for(let i=-4;i<=4;i++){
    if(i===0)continue;
    let[px,py]=toS(i,0);ctx.fillText(i,px-(i<0?9:4),py+13);
    let[qx,qy]=toS(0,i);
    ctx.fillText(i===1?'i':i===-1?'-i':i+'i',C+4,qy+4);
  }
  ctx.fillText('0',C+4,C+13);
}

function fadedCurve(ctx,ps,color){
  if(ps.length<2)return;
  ctx.save();ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.globalAlpha=0.18;
  ctx.beginPath();ps.forEach(([x,y],i)=>{let[sx,sy]=toS(x,y);i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);});
  ctx.stroke();ctx.restore();
}
function activePath(ctx,ps,cnt,color){
  if(cnt<2)return;
  ctx.save();ctx.strokeStyle=color;ctx.lineWidth=2.5;
  ctx.beginPath();for(let i=0;i<cnt;i++){let[sx,sy]=toS(ps[i][0],ps[i][1]);i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);}
  ctx.stroke();ctx.restore();
}
function drawDot(ctx,x,y,color,r=6){
  let[sx,sy]=toS(x,y);
  ctx.save();ctx.fillStyle=color;ctx.beginPath();ctx.arc(sx,sy,r,0,2*Math.PI);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
}
function drawArm(ctx,x,y){
  let[ox,oy]=toS(0,0),[sx,sy]=toS(x,y);
  ctx.save();ctx.strokeStyle=css('--purple');ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.globalAlpha=0.7;
  ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(sx,sy);ctx.stroke();ctx.restore();
}
function drawRing(ctx,r){
  let[ox,oy]=toS(0,0);
  ctx.save();ctx.strokeStyle=css('--purple');ctx.lineWidth=1;ctx.setLineDash([3,4]);ctx.globalAlpha=0.3;
  ctx.beginPath();ctx.arc(ox,oy,Math.min(r*SC,SZ),0,2*Math.PI);ctx.stroke();ctx.restore();
}
function drawLbl(ctx,x,y,text,color){
  let[sx,sy]=toS(x,y);
  ctx.save();ctx.fillStyle=color;ctx.font='10px -apple-system,sans-serif';
  ctx.fillText(text,sx+7,sy-7);ctx.restore();
}

function fillRegion(ctx,bounds,frac){
  for(const b of bounds){
    const cnt=Math.max(3,Math.floor(b.length*frac));
    ctx.save();ctx.fillStyle=css('--yellow');ctx.strokeStyle=css('--ystroke');ctx.lineWidth=1.8;
    ctx.beginPath();for(let i=0;i<cnt;i++){let[sx,sy]=toS(b[i][0],b[i][1]);i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);}
    if(frac>=1)ctx.closePath();ctx.fill();ctx.stroke();ctx.restore();
  }
}

// ── Render ────────────────────────────────────────────────────
function render(frac){
  const curve=document.getElementById('inp-curve').value;
  const isReg=['disk','annulus','sector','hstrip','vstrip','rect','uhalf','rhalf'].includes(curve);
  const f=getTransform();
  const bc=css('--blue'),rc=css('--red');

  drawGrid(ctxZ);drawGrid(ctxW);

  if(!isReg){
    fadedCurve(ctxZ,pts,bc);
    fadedCurve(ctxW,mpts,rc);
    const cnt=Math.max(1,Math.floor(pts.length*frac));
    activePath(ctxZ,pts,cnt,bc);
    activePath(ctxW,mpts,cnt,rc);
    if(cnt>=1){
      const[zx,zy]=pts[cnt-1],[wx,wy]=mpts[cnt-1];
      const r=cabs([zx,zy]),rw=cabs([wx,wy]);
      const th=carg([zx,zy]),thw=carg([wx,wy]);
      drawRing(ctxZ,r);drawArm(ctxZ,zx,zy);
      drawRing(ctxW,rw);drawArm(ctxW,wx,wy);
      drawDot(ctxZ,zx,zy,bc);drawLbl(ctxZ,zx,zy,`(${fmt(zx)},${fmt(zy)})`,bc);
      drawDot(ctxW,wx,wy,rc);drawLbl(ctxW,wx,wy,`(${fmt(wx)},${fmt(wy)})`,rc);
      const zs=`${fmt(zx)} ${zy>=0?'+':'-'} ${fmt(Math.abs(zy))}i`;
      const ws=`${fmt(wx)} ${wy>=0?'+':'-'} ${fmt(Math.abs(wy))}i`;
      document.getElementById('i-z').textContent=zs;
      document.getElementById('i-w').textContent=ws;
      document.getElementById('i-r').textContent=`${fmt(r)} → ${fmt(rw)}`;
      document.getElementById('i-t').textContent=`${deg(th)}° → ${deg(thw)}°`;
    }
  } else {
    const zB=getRegionBounds();
    const wB=zB.map(b=>{
      return b.map(([x,y])=>{const w=f([x,y]);return[isFinite(w[0])&&Math.abs(w[0])<20?w[0]:0,isFinite(w[1])&&Math.abs(w[1])<20?w[1]:0];});
    });
    // z-plane full
    fillRegion(ctxZ,zB,1);
    for(const b of zB){
      ctxZ.save();ctxZ.strokeStyle=bc;ctxZ.lineWidth=1.8;
      ctxZ.beginPath();b.forEach(([x,y],i)=>{let[sx,sy]=toS(x,y);i===0?ctxZ.moveTo(sx,sy):ctxZ.lineTo(sx,sy);});
      ctxZ.closePath();ctxZ.stroke();ctxZ.restore();
    }
    // w-plane animated
    fillRegion(ctxW,wB,frac);
    for(const b of wB){
      const cnt=Math.max(2,Math.floor(b.length*frac));
      ctxW.save();ctxW.strokeStyle=rc;ctxW.lineWidth=1.8;
      ctxW.beginPath();for(let i=0;i<cnt;i++){let[sx,sy]=toS(b[i][0],b[i][1]);i===0?ctxW.moveTo(sx,sy):ctxW.lineTo(sx,sy);}
      if(frac>=1)ctxW.closePath();ctxW.stroke();ctxW.restore();
    }
    ['i-z','i-w','i-r','i-t'].forEach(id=>document.getElementById(id).textContent='영역 모드');
  }

  const pct=Math.round(frac*100);
  document.getElementById('pr-sl').value=pct;
  document.getElementById('pr-v').textContent=pct+'%';
}

// ── Animation ─────────────────────────────────────────────────
function toggleAnim(){
  const btn=document.getElementById('btn-play');
  if(animId){cancelAnimationFrame(animId);animId=null;btn.textContent='▶ 재생';return;}
  if(progress>=1)progress=0;
  btn.textContent='⏸ 일시정지';
  const step=()=>{
    const sp=parseInt(document.getElementById('sp').value)||3;
    progress=Math.min(progress+sp*0.0025,1);
    render(progress);
    if(progress<1)animId=requestAnimationFrame(step);
    else{animId=null;btn.textContent='▶ 재생';}
  };
  animId=requestAnimationFrame(step);
}

function resetAnim(){
  if(animId){cancelAnimationFrame(animId);animId=null;}
  progress=0;
  document.getElementById('btn-play').textContent='▶ 재생';
  const f=getTransform();
  pts=getCurvePoints();
  mpts=pts.map(z=>{const w=f(z);return[isFinite(w[0])&&Math.abs(w[0])<20?w[0]:0,isFinite(w[1])&&Math.abs(w[1])<20?w[1]:0];});
  updateFormula();
  render(0);
}

// ── Events ────────────────────────────────────────────────────
document.getElementById('pr-sl').addEventListener('input',function(){
  if(animId){cancelAnimationFrame(animId);animId=null;document.getElementById('btn-play').textContent='▶ 재생';}
  progress=this.value/100;render(progress);
});
document.getElementById('sp').addEventListener('input',function(){document.getElementById('sp-v').textContent=this.value;});
document.getElementById('inp-curve').addEventListener('change',()=>{updateCurveParams();resetAnim();});
document.getElementById('s1-fn').addEventListener('change',()=>{updateParamVisibility();resetAnim();});
document.getElementById('s3-fn').addEventListener('change',()=>{updateParamVisibility();resetAnim();});

// universal input change → reset
document.querySelectorAll('input[type=number],select').forEach(el=>{
  el.addEventListener('change',()=>{updateFormula();resetAnim();});
  el.addEventListener('input',()=>{updateFormula();resetAnim();});
});

// init
updateParamVisibility();
resetAnim();
</script>
